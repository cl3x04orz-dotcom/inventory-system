services:
  - type: web
    name: inventory-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GAS_API_URL
        sync: false
      - key: PORT
        value: "3000"
