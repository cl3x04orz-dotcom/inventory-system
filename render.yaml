services:
  - type: web
    name: inventory-system
    runtime: node
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GAS_API_URL
        sync: false
      - key: PORT
        value: "10000"
