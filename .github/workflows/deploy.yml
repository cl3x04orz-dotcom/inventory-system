name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies 📦
        run: npm ci

      - name: Sync version to Code.gs 🔖
        run: |
          BUILD_TIME=$(node -e "console.log(Date.now())")
          echo "BUILD_TIME=$BUILD_TIME" >> $GITHUB_ENV
          # 更新 Code.gs 的 APP_VERSION，與前端 __BUILD_TIME__ 完全一致
          sed -i "s/const APP_VERSION = '[^']*'/const APP_VERSION = '$BUILD_TIME'/" Code.gs
          echo "✅ APP_VERSION updated to $BUILD_TIME"

      - name: Build 🏗️
        run: npm run build
        env:
          VITE_GAS_API_URL: ${{ secrets.VITE_GAS_API_URL }}

      - name: Commit updated Code.gs 📝
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Code.gs
          git diff --staged --quiet || git commit -m "chore: auto-sync APP_VERSION to ${{ env.BUILD_TIME }}"
          git push origin main || true

      - name: Deploy 🚀
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
